# ============================================================
# Kelex Downloader - Docker Compose
#
# Quick Start:
#   docker-compose up -d
#
# Build from source:
#   docker-compose up -d --build
#
# Stop:
#   docker-compose down
#
# View logs:
#   docker-compose logs -f
#
# Update:
#   docker-compose pull && docker-compose up -d
# ============================================================

version: '3.8'

services:
  kelex:
    build:
      context: .
      dockerfile: Dockerfile
    image: kelex/downloader:latest
    container_name: kelex-downloader
    restart: unless-stopped
    
    # Port mapping - change host port if 3000 is taken
    ports:
      - "3000:80"
    
    # Optional: Persist download directory
    # volumes:
    #   - ./downloads:/downloads
    
    # Resource limits (optional)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #       cpus: '1.0'
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    
    # Environment
    environment:
      - NODE_ENV=production
    
    # Labels for organization
    labels:
      - "app.name=kelex-downloader"
      - "app.version=2.0.0"

# ============================================================
# Kelex Download Engine v2.0 — Docker Compose
# Services: backend (Fastify + yt-dlp + aria2 + ffmpeg) + nginx frontend
# ============================================================

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: kelex/backend:latest
    container_name: kelex-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - kelex-downloads:/opt/kelex-downloads
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DOWNLOAD_DIR=/opt/kelex-downloads
      - MAX_CONCURRENT=5
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "app.name=kelex-backend"
      - "app.version=2.0.0"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: kelex/frontend:latest
    container_name: kelex-frontend
    restart: unless-stopped
    ports:
      - "3004:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - "app.name=kelex-frontend"
      - "app.version=2.0.0"

volumes:
  kelex-downloads:
    driver: local
